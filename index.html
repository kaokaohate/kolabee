<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game">
      <h1>Snake</h1>
      <p class="meta">Score: <span data-score>0</span></p>
      <p class="meta" data-status>Running</p>
      <div class="board" data-board aria-label="Snake board"></div>

      <div class="actions">
        <button data-pause>Pause</button>
        <button data-restart>Restart</button>
      </div>

      <div class="controls" aria-label="Direction controls">
        <button data-control="up">↑</button>
        <div class="controls-row">
          <button data-control="left">←</button>
          <button data-control="down">↓</button>
          <button data-control="right">→</button>
        </div>
      </div>

      <p class="hint">Use arrow keys / WASD. Space toggles pause.</p>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
